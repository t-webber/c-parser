name: Clippy

on:
  push:
    paths:
      - "**/*.rs"
      - ".github/workflows/clippy.yml"
      - "Cargo.*"
  pull_request:
    paths:
      - "**/*.rs"
      - "Cargo.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: clippy

      - name: Cargo clippy
        run: cargo clippy --all
